<!DOCTYPE html>
<html>
<head>
<title>Advanced Typing Speed Tester</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Typing Speed Tester</h1>

<p id="sentence">
Practice makes a person perfect and typing fast saves time.
</p>

<textarea id="input" placeholder="Start typing here..." oninput="checkTyping()"></textarea>

<div class="result">

<p>⏱️ Time: <span id="time">0</span> sec</p>
<p>⚡ Speed: <span id="speed">0</span> WPM</p>
<p>🎯 Accuracy: <span id="accuracy">0</span>%</p>

</div>

<button onclick="restartTest()">Restart</button>

</div>

<script src="script.js"></script>

</body>
</html>
